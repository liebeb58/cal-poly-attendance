<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance Check-In — Prof. Lieberman (Cal Poly)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeecea;
  --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
  --green-bg: #EAF3DE; --green-text: #27500A;
  --amber-bg: #FAEEDA; --amber-text: #633806;
  --red-bg: #FCEBEB; --red-text: #791F1F;
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
    --text: #f0eeea; --text2: #b4b2a9; --text3: #888780;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --blue-bg: #0c2a45; --blue-text: #85b7eb;
    --green-bg: #1a2e0f; --green-text: #c0dd97;
    --amber-bg: #2e1f06; --amber-text: #fac775;
    --red-bg: #2e0f0f; --red-text: #f7c1c1;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
.page { max-width: 580px; margin: 0 auto; }
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
.sec { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .85rem; }
.field { margin-bottom: .9rem; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
input[type=text], input[type=number], input[type=url], input[type=password], select {
  width: 100%; padding: 9px 11px; font-size: 14px;
  border: 0.5px solid var(--border2); border-radius: var(--radius);
  background: var(--bg); color: var(--text);
  font-family: inherit; transition: border-color .15s, box-shadow .15s;
}
input:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,.15); }
.mono { font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: .08em; text-transform: uppercase; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-p { display: block; width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; transition: background .15s; }
.btn-p:hover { filter: brightness(0.88); }
.btn-p:disabled { background: var(--bg2); color: var(--text3); cursor: not-allowed; filter: none; }
.btn-o { padding: 7px 14px; font-size: 13px; font-weight: 500; background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; color: var(--text); font-family: inherit; }
.btn-o:hover { background: var(--bg2); }
.btn-o:disabled { color: var(--text3); cursor: not-allowed; }
.btn-sm { padding: 5px 11px; font-size: 12px; font-weight: 500; background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; color: var(--text); font-family: inherit; }
.btn-sm:hover { background: var(--bg2); }
.geo-row { display: flex; align-items: center; gap: 10px; }
.geo-badge { flex: 1; padding: 9px 11px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg2); font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 7px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab-row { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid var(--border2); cursor: pointer; background: transparent; color: var(--text2); font-family: inherit; }
.tab.active { background: var(--bg2); color: var(--text); font-weight: 600; }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; gap: 8px; }
.title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.subtitle { font-size: 13px; color: var(--text2); }
.badge-g { background: var(--green-bg); color: var(--green-text); font-size: 11px; padding: 2px 8px; border-radius: var(--radius); font-weight: 600; white-space: nowrap; }
.badge-r { background: var(--red-bg); color: var(--red-text); font-size: 11px; padding: 2px 8px; border-radius: var(--radius); font-weight: 600; white-space: nowrap; }
.badge-a { background: var(--amber-bg); color: var(--amber-text); font-size: 11px; padding: 2px 8px; border-radius: var(--radius); font-weight: 600; white-space: nowrap; }
.info-box { background: var(--blue-bg); border: 0.5px solid rgba(24,95,165,.25); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; color: var(--blue-text); margin-bottom: 1rem; }
.warn-box { background: var(--amber-bg); border: 0.5px solid rgba(186,117,23,.3); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; color: var(--amber-text); margin-bottom: 1rem; }
.rec-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; gap: 8px; }
.rec-row:last-child { border-bottom: none; }
.rk { color: var(--text2); flex-shrink: 0; }
.rv { font-weight: 500; color: var(--text); text-align: right; }
.log-wrap { overflow-x: auto; }
.log-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 420px; }
.log-table th { text-align: left; padding: 8px 10px; color: var(--text2); font-weight: 600; border-bottom: 0.5px solid var(--border); white-space: nowrap; background: var(--bg); }
.log-table td { padding: 7px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
.log-table tr:last-child td { border-bottom: none; }
.log-table tr:hover td { background: var(--bg2); }
.code-disp { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 30px; font-weight: 700; letter-spacing: .18em; background: var(--bg2); border-radius: var(--radius); padding: 12px 24px; display: inline-block; }
pre { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--text); white-space: pre; overflow-x: auto; line-height: 1.55; margin-bottom: 8px; }
hr { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
.step-row { display: flex; align-items: flex-start; margin-bottom: 9px; font-size: 13px; color: var(--text2); line-height: 1.5; gap: 8px; }
.step-num { display: inline-flex; width: 20px; height: 20px; border-radius: 50%; background: var(--blue-bg); color: var(--blue-text); font-size: 11px; font-weight: 700; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; padding: 1rem; }
.metric { background: var(--bg2); border-radius: var(--radius); padding: 9px 11px; }
.metric-label { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
.metric-val { font-size: 22px; font-weight: 700; color: var(--text); }
.success-wrap { text-align: center; padding: 1.5rem 1rem; }
.check-circle { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
.sync-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: var(--radius); font-size: 13px; margin-top: 8px; }
.sync-ok { background: var(--green-bg); color: var(--green-text); }
.sync-fail { background: var(--red-bg); color: var(--red-text); }
.sync-pend { background: var(--amber-bg); color: var(--amber-text); }
.sync-none { background: var(--bg2); color: var(--text2); }
.export-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.login-wrap { max-width: 340px; margin: 3rem auto; }
.login-logo { width: 44px; height: 44px; border-radius: 50%; background: var(--blue-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
.course-picker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 1.25rem; }
.course-card { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.25rem 1rem; cursor: pointer; text-align: center; transition: background .15s, border-color .15s; }
.course-card:hover { background: var(--bg2); }
.course-pill { padding: 5px 13px; font-size: 12px; font-weight: 600; border-radius: 100px; border: 1.5px solid transparent; cursor: pointer; background: var(--bg2); color: var(--text2); font-family: inherit; transition: all .15s; }
.course-selector-bar { display: flex; gap: 7px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.url-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 9px 11px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--text); word-break: break-all; margin-bottom: 4px; }
.shake { animation: shake .35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)} }
</style>
</head>
<body>
<div class="page"><div id="app"></div></div>
<script>
const APPS_SCRIPT_CODE = `function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action || 'submit';
    var props = PropertiesService.getScriptProperties();
    var courseId = data.courseId || 'default';
    var codeKey = 'code_' + courseId;

    if (action === 'publishCode') {
      props.setProperty(codeKey, (data.code || '').toUpperCase());
      props.setProperty(codeKey + '_ts', String(Date.now()));
      return ContentService.createTextOutput(JSON.stringify({ok:true, action:'publishCode'}))
        .setMimeType(ContentService.MimeType.JSON);
    }
    if (action === 'clearCode') {
      props.deleteProperty(codeKey);
      props.deleteProperty(codeKey + '_ts');
      return ContentService.createTextOutput(JSON.stringify({ok:true, action:'clearCode'}))
        .setMimeType(ContentService.MimeType.JSON);
    }

    // default action: submit an attendance record
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheetName = data.course || 'Attendance';
    var sheet = ss.getSheetByName(sheetName);
    if (!sheet) { sheet = ss.insertSheet(sheetName); }
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(['Date','Time','Name','Course','Session Code',
        'Code Check','Location Check','Latitude','Longitude','GPS Accuracy (m)']);
      sheet.getRange(1,1,1,10).setFontWeight('bold').setBackground('#E8F0FE');
    }
    var correctCode = (props.getProperty(codeKey) || '').toUpperCase();
    var submittedCode = (data.code || '').toUpperCase();
    // Server-side verification is authoritative when a code has been published.
    // If no code is published server-side, fall back to the client's codeOk flag
    // so legacy deployments keep working.
    var codeOk;
    if (correctCode) {
      codeOk = submittedCode === correctCode;
    } else {
      codeOk = Boolean(data.codeOk);
    }
    sheet.appendRow([data.date, data.time, data.name, data.course, data.code,
      codeOk ? 'PASS' : 'FAIL',
      data.geoOk === true ? 'PASS' : data.geoOk === false ? 'FAIL' : 'N/A',
      data.lat || '', data.lng || '', data.accuracy || '']);
    return ContentService.createTextOutput(JSON.stringify({
      ok: true,
      codeOk: codeOk,
      codeSource: correctCode ? 'server' : 'client'
    })).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({ok:false,error:err.message}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function doGet(e) {
  try {
    var courseId = (e && e.parameter && e.parameter.courseId) || 'default';
    var props = PropertiesService.getScriptProperties();
    var code = props.getProperty('code_' + courseId) || '';
    var ts = props.getProperty('code_' + courseId + '_ts') || '';
    return ContentService.createTextOutput(JSON.stringify({
      ok: true, code: code, courseId: courseId, publishedAt: ts
    })).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({ok:false,error:err.message}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;
const COURSES = [
  { id:'ITP428', label:'ITP 428', color:'#185FA5', bg:'#E6F1FB', txt:'#0C447C' },
  { id:'ITP406', label:'ITP 406', color:'#0F6E56', bg:'#E1F5EE', txt:'#085041' },
  { id:'BUS310', label:'Bus 310-313', color:'#154734', bg:'#E4F0E9', txt:'#0B2A1E' } // Cal Poly green
];
const getCourse = id => COURSES.find(c=>c.id===id) || COURSES[0];
function urlCourse() {
  const p = new URLSearchParams(window.location.search).get('course');
  return (p && COURSES.find(c=>c.id===p)) ? p : null;
}
const PASS_KEY='attend_pass', DEFAULT_PASS='changeme';
const SHEETS_KEY_PREFIX='attend_sheets_url_'; // per-course: attend_sheets_url_<courseId>
function getPass() { return localStorage.getItem(PASS_KEY)||DEFAULT_PASS; }
function setPass(p) { localStorage.setItem(PASS_KEY,p); }
function getSheetsUrl(id) { return localStorage.getItem(SHEETS_KEY_PREFIX+id)||''; }
function setSheetsUrl(id,u) { if(u){localStorage.setItem(SHEETS_KEY_PREFIX+id,u);} else {localStorage.removeItem(SHEETS_KEY_PREFIX+id);} }
// One-time migration: if any course has no per-course URL but the legacy global
// URL exists, copy it to each course so an existing instructor keeps working.
(function migrateLegacySheetsUrl(){
  var legacy = localStorage.getItem('attend_sheets_url');
  if(!legacy) return;
  (COURSES||[]).forEach(function(c){
    if(!localStorage.getItem(SHEETS_KEY_PREFIX+c.id)){
      localStorage.setItem(SHEETS_KEY_PREFIX+c.id, legacy);
    }
  });
})();
function cfgKey(id) { return 'attend_cfg_'+id; }
function recsKey(id) { return 'attend_recs_'+id; }
function randCode() { const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join(''); }
function loadCfg(id) {
  try { return Object.assign({sessionCode:randCode(),classroomLat:null,classroomLng:null,classroomRadius:100,classroomSet:false}, JSON.parse(localStorage.getItem(cfgKey(id))||'{}')); }
  catch(e) { return {sessionCode:randCode(),classroomLat:null,classroomLng:null,classroomRadius:100,classroomSet:false}; }
}
function saveCfg(id,cfg) { localStorage.setItem(cfgKey(id), JSON.stringify({sessionCode:cfg.sessionCode,classroomLat:cfg.classroomLat,classroomLng:cfg.classroomLng,classroomRadius:cfg.classroomRadius,classroomSet:cfg.classroomSet})); }
function loadRecs(id) { try { return JSON.parse(localStorage.getItem(recsKey(id))||'[]'); } catch(e) { return []; } }
function saveRecs(id,recs) { localStorage.setItem(recsKey(id),JSON.stringify(recs)); }
const fixedCourse = urlCourse();
const cdata = {};
COURSES.forEach(c => {
  const cfg = loadCfg(c.id);
  cdata[c.id] = { ...cfg, records: loadRecs(c.id), newCodeInput:'', newLatInput: cfg.classroomLat ? Number(cfg.classroomLat).toFixed(5) : '', newLngInput: cfg.classroomLng ? Number(cfg.classroomLng).toFixed(5) : '', newRadiusInput: String(cfg.classroomRadius||100) };
});
const cd = id => cdata[id];
const st = {
  view: fixedCourse ? 'student' : 'pick',
  instructorAuthed: false, loginError: false,
  geo: null, geoStatus: 'idle', geoError: null,
  studentCourse: fixedCourse || COURSES[0].id,
  instructorCourse: COURSES[0].id,
  tab: 'setup',
  // sheetsUrlDraft: per-course in-progress edits to the URL field, keyed by course id.
  // Actual saved value lives in localStorage via getSheetsUrl(id)/setSheetsUrl(id,url).
  sheetsUrlDraft: {},
  // codePublishStatus[courseId] = 'idle'|'publishing'|'ok'|'fail'|'none'
  // 'none' means this course has no Sheets URL configured so server publish is a no-op.
  codePublishStatus: {},
  // codePublishedAt[courseId] = Date.now() of last successful publish (number)
  codePublishedAt: {},
  newPass1: '', newPass2: '', passMsg: ''
};
function fmt(n,d=5) { return n!=null ? Number(n).toFixed(d) : '--'; }
function dist(la1,lo1,la2,lo2) {
  const R=6371000,dL=(la2-la1)*Math.PI/180,dG=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function geoVerify(id) {
  const c=cd(id);
  if(!c.classroomSet) return {ok:null,label:'No classroom set'};
  if(!st.geo) return {ok:false,label:'Location not captured'};
  const d=dist(st.geo.latitude,st.geo.longitude,c.classroomLat,c.classroomLng);
  return {ok:d<=c.classroomRadius, label: d<=c.classroomRadius ? `Within range (${Math.round(d)}m away)` : `Out of range (${Math.round(d)}m away)`};
}
function requestGeo() {
  st.geoStatus='loading'; render();
  if(!navigator.geolocation){st.geoStatus='unsupported';render();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{st.geo=p.coords;st.geoStatus='success';render();},
    e=>{st.geoStatus='error';st.geoError=e.message;render();},
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}
async function postToSheets(rec, courseId) {
  var url = getSheetsUrl(courseId);
  if(!url) return {status:'none'};
  try {
    // text/plain avoids a CORS preflight, and Apps Script /exec returns
    // Access-Control-Allow-Origin:* so we CAN read the response JSON.
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(rec),
      redirect:'follow'
    });
    let body = null;
    try { body = await res.json(); } catch(_) {}
    return {status:'ok', body: body};
  } catch(e) {
    return {status:'fail', error: e && e.message};
  }
}
async function publishCodeToServer(courseId, code) {
  const url = getSheetsUrl(courseId);
  if(!url) return {status:'none'};
  try {
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'publishCode', courseId: courseId, code: code}),
      redirect:'follow'
    });
    let body = null;
    try { body = await res.json(); } catch(_) {}
    if(body && body.ok) return {status:'ok'};
    return {status:'fail', error: body && body.error};
  } catch(e) {
    return {status:'fail', error: e && e.message};
  }
}
// Orchestrates publish: renders 'publishing' state immediately, fires publish,
// stores final status so the badge updates. Called after Apply / Generate.
async function publishCurrentCode(courseId) {
  const c = cd(courseId);
  const hasUrl = Boolean(getSheetsUrl(courseId));
  if (!hasUrl) {
    st.codePublishStatus[courseId] = 'none';
    render();
    return;
  }
  st.codePublishStatus[courseId] = 'publishing';
  render();
  const result = await publishCodeToServer(courseId, c.sessionCode);
  if (result.status === 'ok') {
    st.codePublishStatus[courseId] = 'ok';
    st.codePublishedAt[courseId] = Date.now();
  } else if (result.status === 'none') {
    st.codePublishStatus[courseId] = 'none';
  } else {
    st.codePublishStatus[courseId] = 'fail';
  }
  render();
}
let submitted=null, showSuccess=false;
async function handleSubmit(name,code,courseId) {
  const now=new Date(); const gv=geoVerify(courseId); const c=cd(courseId); const course=getCourse(courseId);
  const submittedCode = code.trim().toUpperCase();
  // Optimistic client-side verdict - only used if server never returns one
  // (e.g. no Sheets URL configured, or fetch fails). Server verdict is
  // authoritative for any deployment with a live Apps Script endpoint.
  const localCodeOk = submittedCode === c.sessionCode.toUpperCase();
  const rec={id:Date.now(),name,courseId,courseLabel:course.label,code:submittedCode,
    codeOk: localCodeOk,
    codeVerifiedBy: 'local-pending',
    time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    date:now.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}),
    geoOk:gv.ok,lat:st.geo?st.geo.latitude:null,lng:st.geo?st.geo.longitude:null,
    accuracy:st.geo?Math.round(st.geo.accuracy):null,syncStatus:'pending'};
  c.records.push(rec); saveRecs(courseId,c.records);
  submitted=rec; showSuccess=true; render();
  const sr=await postToSheets({...rec,course:course.label}, courseId);
  rec.syncStatus=sr.status;
  if (sr.status === 'ok' && sr.body && typeof sr.body.codeOk === 'boolean') {
    rec.codeOk = sr.body.codeOk;
    rec.codeVerifiedBy = sr.body.codeSource === 'server' ? 'server' : 'client';
  } else if (sr.status === 'none') {
    rec.codeVerifiedBy = 'local-no-endpoint';
  } else if (sr.status === 'fail') {
    rec.codeVerifiedBy = 'local-network-fail';
  }
  saveRecs(courseId,c.records);
  if(showSuccess&&submitted&&submitted.id===rec.id) render();
}
function exportCSV(courseId) {
  const recs=cd(courseId).records; const course=getCourse(courseId);
  const hdr=['Date','Time','Name','Course','Code','Code Check','Location Check','Lat','Lng','Accuracy'];
  const rows=recs.map(r=>[r.date,r.time,r.name,r.courseLabel,r.code,r.codeOk?'PASS':'FAIL',r.geoOk===true?'PASS':r.geoOk===false?'FAIL':'N/A',r.lat||'',r.lng||'',r.accuracy||'']);
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`attendance-${courseId}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
}
function render() {
  const app=document.getElementById('app');
  if(showSuccess&&submitted){app.innerHTML=successHTML(submitted);attachE();return;}
  if(st.view==='pick'){app.innerHTML=pickHTML();attachE();return;}
  if(st.view==='student'){app.innerHTML=studentHTML();attachE();return;}
  if(!st.instructorAuthed){app.innerHTML=loginHTML();attachE();return;}
  app.innerHTML=instructorHTML();attachE();

function attachE() {
  const on=(id,ev,fn)=>{const e=document.getElementById(id);if(e)e.addEventListener(ev,fn);};
  const iid=st.instructorCourse; const c=cd(iid);
  on('toInstructor','click',()=>{st.view='instructor';st.loginError=false;render();});
  on('backFromLogin','click',()=>{st.view=fixedCourse?'student':'pick';render();});
  on('toStudent','click',()=>{st.view=fixedCourse?'student':'pick';render();});
  on('logoutBtn','click',()=>{st.instructorAuthed=false;st.view=fixedCourse?'student':'pick';render();});
  on('loginBtn','click',()=>{
    const p=document.getElementById('loginPass')?.value;
    if(p===getPass()){st.instructorAuthed=true;st.loginError=false;st.tab='setup';render();}
    else{st.loginError=true;render();const el=document.getElementById('loginPass');if(el){el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');el.value='';el.focus();}}
  });
  const lp=document.getElementById('loginPass');
  if(lp)lp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn')?.click();});
  // [data-pick] handlers removed intentionally: the gateway view no longer
  // offers a student-facing course picker. Students must arrive via their
  // Canvas page's ?course=XXXX link.
  document.querySelectorAll('[data-ipick]').forEach(el=>el.addEventListener('click',()=>{st.instructorCourse=el.dataset.ipick;render();}));
  on('tabSetup','click',()=>{st.tab='setup';render();});
  on('tabSheets','click',()=>{st.tab='sheets';render();});
  on('tabRecords','click',()=>{st.tab='records';render();});
  on('geoBtn','click',requestGeo);
  on('anotherBtn','click',()=>{showSuccess=false;submitted=null;render();});
  on('submitBtn','click',()=>{
    const n=document.getElementById('sName')?.value.trim();
    const co=document.getElementById('sCode')?.value.trim();
    if(!n){alert('Please enter your name.');return;}
    if(!co){alert('Please enter the session code.');return;}
    handleSubmit(n,co,st.studentCourse);
  });
  on('applyCode','click',()=>{
    const v=document.getElementById('newCode')?.value.trim().toUpperCase();
    if(!(v&&v.length>=3)){alert('Enter at least 3 characters.');return;}
    c.sessionCode=v;c.newCodeInput='';saveCfg(iid,c);
    publishCurrentCode(iid);
  });
  on('randCode','click',()=>{
    c.sessionCode=randCode();saveCfg(iid,c);
    publishCurrentCode(iid);
  });
  on('useMyLoc','click',()=>{
    if(!navigator.geolocation){alert('Geolocation not supported.');return;}
    navigator.geolocation.getCurrentPosition(p=>{c.classroomLat=p.coords.latitude;c.classroomLng=p.coords.longitude;c.classroomSet=true;c.newLatInput=p.coords.latitude.toFixed(5);c.newLngInput=p.coords.longitude.toFixed(5);saveCfg(iid,c);render();},e=>alert('Could not get location: '+e.message),{enableHighAccuracy:true});
  });
  on('applyLoc','click',()=>{
    const la=parseFloat(document.getElementById('latI')?.value);
    const lo=parseFloat(document.getElementById('lngI')?.value);
    const r=parseFloat(document.getElementById('radI')?.value);
    if(isNaN(la)||isNaN(lo)){alert('Enter valid coordinates.');return;}
    c.classroomLat=la;c.classroomLng=lo;c.classroomRadius=r||100;c.classroomSet=true;saveCfg(iid,c);render();
  });
  on('changePass','click',()=>{
    const p1=document.getElementById('newPass1')?.value.trim();
    const p2=document.getElementById('newPass2')?.value.trim();
    if(!p1){st.passMsg='Please enter a new password.';render();return;}
    if(p1!==p2){st.passMsg='Passwords do not match.';render();return;}
    if(p1.length<4){st.passMsg='Must be at least 4 characters.';render();return;}
    setPass(p1);st.passMsg='Password updated successfully.';st.newPass1='';st.newPass2='';render();
  });
  on('copyScript','click',()=>{navigator.clipboard?.writeText(APPS_SCRIPT_CODE).then(()=>{const b=document.getElementById('copyScript');if(b){b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',2200);}}).catch(()=>alert('Select and copy the code manually.'));});
  on('saveUrl','click',()=>{
    const u=document.getElementById('sheetsUrlI')?.value.trim()||'';
    const wasEmpty = !getSheetsUrl(iid);
    setSheetsUrl(iid,u);
    delete st.sheetsUrlDraft[iid];
    render();
    // If this is the first time a URL is saved for this course, auto-publish
    // the current session code so the server verification is immediately live.
    if (u && wasEmpty) { publishCurrentCode(iid); }
  });
  on('clearUrl','click',()=>{
    if(confirm(`Remove the Google Sheets URL for ${getCourse(iid).label}? Submissions for this course will stop syncing until you set a new one.`)){
      setSheetsUrl(iid,'');
      delete st.sheetsUrlDraft[iid];
      // Server no longer reachable — reset publish status so the Setup tab
      // badge reflects the disconnected state.
      st.codePublishStatus[iid] = 'none';
      render();
    }
  });
  on('testUrl','click',async()=>{
    const b=document.getElementById('testUrl');if(b){b.textContent='Sending…';b.disabled=true;}
    const cLabel = getCourse(iid).label;
    await postToSheets({name:'TEST ENTRY',courseLabel:cLabel,course:cLabel,date:'Test',time:'Test',code:'TEST',codeOk:true,geoOk:null,lat:'',lng:'',accuracy:''}, iid);
    if(b){b.textContent='Sent! Check your sheet';setTimeout(()=>{b.textContent='Test connection';b.disabled=false;},3000);}
  });
  on('exportCSV','click',()=>exportCSV(iid));
  on('clearRecs','click',()=>{if(confirm(`Clear all local records for ${getCourse(iid).label}?`)){c.records=[];saveRecs(iid,c.records);render();}});
  const fi=[['newCode','newCodeInput'],['latI','newLatInput'],['lngI','newLngInput'],['radI','newRadiusInput']];
  fi.forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.addEventListener('input',e=>{c[key]=e.target.value;});});
  const su=document.getElementById('sheetsUrlI');if(su)su.addEventListener('input',e=>{st.sheetsUrlDraft[iid]=e.target.value;});
  const np1=document.getElementById('newPass1');if(np1)np1.addEventListener('input',e=>st.newPass1=e.target.value);
  const np2=document.getElementById('newPass2');if(np2)np2.addEventListener('input',e=>st.newPass2=e.target.value);
  // Auto-capture location as soon as the student view first renders in 'idle' state.
  // Browser still shows a one-time permission prompt (required by spec); subsequent
  // visits from the same device are silent once the student has clicked Allow.
  if(st.view==='student'&&!showSuccess&&st.geoStatus==='idle'){
    setTimeout(requestGeo,120);
  }
}
render();
</script>
</body>
</html>
